name: Bug Report
description: Report a bug with the NOAA It All integration
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below to help us investigate.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
      placeholder: e.g. 2024.12.0
    validations:
      required: true

  - type: input
    id: integration-version
    attributes:
      label: Integration version
      placeholder: e.g. 0.3.7
    validations:
      required: true

  - type: dropdown
    id: installation-method
    attributes:
      label: Installation method
      options:
        - HACS
        - Manual
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant Home Assistant log output here.
      render: text

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context about the problem here (screenshots, configuration, etc.).
